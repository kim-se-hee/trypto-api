networks:
  trypto-net:
    name: trypto-net

services:
  mysql:
    image: mysql:8.0.30
    networks:
      - trypto-net
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: trypto
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.14.0
    networks:
      - trypto-net
    environment:
      DATA_SOURCE_NAME: "root:1234@(mysql:3306)/"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - trypto-net
    command:
      - redis-server
      - --port
      - "6379"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    networks:
      - trypto-net
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2-alpine
    networks:
      - trypto-net
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influxdb/init-tasks.sh:/docker-entrypoint-initdb.d/init-tasks.sh
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: trypto
      DOCKER_INFLUXDB_INIT_BUCKET: ticker
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: trypto-collector-token
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  influxdb-data:
