spring:
  application:
    name: trypto-backend
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:trypto;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    hikari:
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  data:
    redis:
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:mymaster}
        nodes: ${REDIS_SENTINEL_NODES:localhost:26379,localhost:26380,localhost:26381}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

influxdb:
  url: ${INFLUXDB_URL:http://localhost:8086}
  token: ${INFLUXDB_TOKEN:trypto-collector-token}
  org: ${INFLUXDB_ORG:trypto}
  bucket: ${INFLUXDB_BUCKET:candle}

app:
  websocket:
    endpoint: /ws
    heartbeat-send: 10000
    heartbeat-receive: 10000
  market-meta-sync:
    max-retries: 30
    retry-interval-seconds: 5
  exchanges:
    - name: UPBIT
      market-type: DOMESTIC
      base-currency-symbol: KRW
      fee-rate: 0.0005
    - name: BITHUMB
      market-type: DOMESTIC
      base-currency-symbol: KRW
      fee-rate: 0.0025
    - name: BINANCE
      market-type: OVERSEAS
      base-currency-symbol: USDT
      fee-rate: 0.001
